trigger:
- main

jobs:

- job: run
  timeoutInMinutes: 10

  pool:
    vmImage: 'ubuntu-latest'

  steps:
  - task: UsePythonVersion@0
    inputs:
      versionSpec: '3.11'

  - script: |
      pwd
      ls -la
      docker compose up -d
      ls -la data
      # cd data/chrome && ls -la
      # cat data/frpc/frpc.log
      docker exec chrome bash -c "ls -la /config"
      sleep 120
    displayName: 'Run'

