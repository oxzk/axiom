trigger:
- main

jobs:

- job: run
  timeoutInMinutes: 10

  pool:
    vmImage: 'ubuntu-latest'

  steps:
  - task: UsePythonVersion@0
    inputs:
      versionSpec: '3.11'

  - script: |
      pwd
      ls -la
      docker compose up -d
      cd /config && ls -la
      docker exec chrome bash -c "ls -la /config && cat /etc/frp/frpc.toml"
      sleep 120
    displayName: 'Run'

